
services:
  # --- DATABASE SERVICE ---
  db:
    image: mysql:8.0
    container_name: barber-db
    restart: always
    environment:
      - MYSQL_ROOT_PASSWORD=${DB_ROOT_PASSWORD}
      - MYSQL_DATABASE=${DB_NAME}
      - MYSQL_USER=${DB_USER}
      - MYSQL_PASSWORD=${DB_PASSWORD}
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql

  # --- BACKEND SERVICE ---
  app:
    build:
      context: ./barber-appointment-backend
      dockerfile: Dockerfile
    container_name: barber-backend
    restart: on-failure
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATASOURCE_URL=${SPRING_DATASOURCE_URL}
      - SPRING_DATASOURCE_USERNAME=${DB_USER}
      - SPRING_DATASOURCE_PASSWORD=${DB_PASSWORD}
    depends_on:
      - db

# --- DATA PERSISTENCE ---
volumes:
  db_data: